data:
  raw_dir: data/raw
  processed_dir: data/processed
  results_dir: results
  frequencies:
    hourly: 1H
    daily: 1D
  timezone: UTC

windows:
  rolling:
    hourly: 4320
    daily: 180
  stride: 1
  min_periods: full

rebalance:
  hourly:
    bars: 24
  daily:
    rule: W-MON
    description: Weekly rebalance every Monday close

portfolio:
  allow_short: false
  long_only: true
  min_weight: 0.0
  max_weight: 0.50
  target_leverage: 1.0
  cvar_alpha: 0.95
  weight_bounds:
    default: [0.0, 0.50]

models:
  random_seed: 42
  solver:
    primary: ECOS
    secondary: SCS
    tolerance: 1.0e-6
    options:
      abstol: 1.0e-6
      reltol: 1.0e-5
      feastol: 1.0e-6
      max_iters: 200
  objectives:
    mv:
      lambda_mean: 1.0
      lambda_variance: 1.0
    mvsk:
      lambda_mean: 1.0
      lambda_variance: 1.0
      lambda_skew: 1.0
      lambda_kurtosis: 1.0
    mcvarsk:
      lambda_mean: 1.0
      lambda_skew: 1.0
      lambda_kurtosis: 1.0
      lambda_cvar: 1.0

ml:
  lag_windows: 10
  targets: [mean, variance, cvar]
  walk_forward:
    train_windows: 60
    test_windows: 1
  feature_flags:
    include_skewness: true
    include_kurtosis: true
    include_cross_assets: false
  estimators:
    lightgbm:
      enabled: true
      params:
        objective: regression
        learning_rate: 0.05
        num_leaves: 31
        n_estimators: 400
        subsample: 0.8
        colsample_bytree: 0.8
        random_state: 42
    random_forest:
      enabled: true
      params:
        n_estimators: 500
        max_depth: null
        min_samples_leaf: 2
        n_jobs: -1
        random_state: 42
